spring:
  application:
    name: think4tech
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/BookStore
    username: postgres
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8290

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

file:
  upload-dir: uploads/books

jwt:
  secret: your-256-bit-secret-key-at-least-32-characters-long-123456
  expiration-ms: 86400000