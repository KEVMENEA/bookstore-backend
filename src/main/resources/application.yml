spring:
  application:
    name: think4tech
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true
  datasource:
    # Supports full URL from Render or individual parts
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:host.docker.internal}:${DB_PORT:5433}/${DB_NAME:BookStore}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Adding SSL might be required for some cloud providers
        # temp disabled for Render internal connections
        # jdbc.postgresql.ssl: true

server:
  port: ${PORT:8290}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

file:
  upload-dir: uploads/books

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-at-least-32-characters-long-123456}
  expiration-ms: 86400000
