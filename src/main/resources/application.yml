spring:
  application:
    name: think4tech
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true
  datasource:
    # Use exact Render environment variable names you provided
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/BookStore}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  # Use PORT from Render, default to 8290 locally
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

file:
  upload-dir: uploads/books

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-at-least-32-characters-long-123456}
  expiration-ms: 86400000
